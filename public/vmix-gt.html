<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>ZapMix — GT vMix</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/media/favicon.png">
<link rel="shortcut icon" href="/media/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  min-height: 100vh;
  width: 100%;
  height: 100vh;
  background-image: url('/media/bg.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 0;
}

/* Container principal com tamanho fixo 1500x880 e centralizado */
.gt-container {
  position: relative;
  z-index: 1;
  width: 1500px;
  height: 880px;
  background: rgba(255, 255, 255, 0.96);
  border-radius: 48px;
  padding: 40px;
  box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(10px);
  animation: fadeIn 0.5s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  transition: all 0.3s ease;
}

/* Scrollbar moderna */
.gt-container::-webkit-scrollbar {
  width: 8px;
}
.gt-container::-webkit-scrollbar-track {
  background: #e2e8f0;
  border-radius: 10px;
  margin: 10px;
}
.gt-container::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #90d105, #6a9e05);
  border-radius: 10px;
}
.gt-container::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(135deg, #a0e015, #7cb518);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Cabeçalho com foto e nome */
.gt-header {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-bottom: 25px;
  padding-bottom: 20px;
  border-bottom: 2px solid rgba(144, 209, 5, 0.3);
  flex-wrap: wrap;
}

.gt-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #90d105;
  background: #f8fafc;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
  transition: transform 0.3s ease;
}
.gt-avatar:hover {
  transform: scale(1.05);
}

.gt-info {
  flex: 1;
}

.gt-name {
  font-size: 2rem;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #1e293b, #334155);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

/* Mensagem de texto - TAMANHO DINÂMICO */
.gt-message {
  background: linear-gradient(135deg, #f8fafc, #ffffff);
  border-radius: 32px;
  padding: 35px;
  margin-bottom: 25px;
  border: 2px solid rgba(144, 209, 5, 0.3);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  transition: all 0.3s ease;
}

/* Quando tem mídia (vídeo, áudio ou imagem) - fonte menor */
.gt-message.with-media {
  padding: 20px 25px;
}

.gt-message.with-media .gt-message-text {
  font-size: 20px;
  font-weight: 600;
  max-height: 150px;
}

/* Quando NÃO tem mídia (só texto) - fonte GRANDE */
.gt-message.only-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 500px;
}

.gt-message.only-text .gt-message-text {
  font-size: 35px;
  font-weight: 700;
  max-height: none;
}

.gt-message-label {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #90d105;
  margin-bottom: 15px;
  font-weight: 700;
}

.gt-message.with-media .gt-message-label {
  margin-bottom: 10px;
  font-size: 0.75rem;
}

.gt-message-text {
  color: #0f172a;
  line-height: 1.4;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-y: auto;
  padding-right: 10px;
  transition: all 0.3s ease;
}

.gt-message-text::-webkit-scrollbar {
  width: 6px;
}
.gt-message-text::-webkit-scrollbar-track {
  background: #e2e8f0;
  border-radius: 10px;
}
.gt-message-text::-webkit-scrollbar-thumb {
  background: #90d105;
  border-radius: 10px;
}

/* ============ PLAYER DE VÍDEO MODERNO ============ */
.video-wrapper {
  margin-top: 20px;
  border-radius: 24px;
  overflow: hidden;
  background: #fff;
  position: relative;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.video-wrapper video {
  width: 100%;
  max-height: 420px;
  background: #fff;
  outline: none;
  display: block;
  object-fit: contain;
}

.video-controls-modern {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 15px;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  flex-wrap: wrap;
}

.video-controls-modern button {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  padding: 10px 18px;
  border-radius: 40px;
  color: white;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(5px);
}

.video-controls-modern button i {
  font-size: 1rem;
}

.video-controls-modern button:hover {
  background: #90d105;
  color: #0f2e00;
  transform: translateY(-2px);
}

/* Progresso do vídeo */
.video-progress {
  padding: 10px 20px;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  display: flex;
  align-items: center;
  gap: 15px;
}

.video-progress span {
  color: white;
  font-size: 0.7rem;
  font-family: monospace;
}

.progress-bar-container {
  flex: 1;
  height: 5px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 5px;
  cursor: pointer;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: #90d105;
  border-radius: 5px;
  width: 0%;
  transition: width 0.1s linear;
}

/* ============ PLAYER DE ÁUDIO MODERNO ============ */
.audio-wrapper {
  margin-top: 20px;
  border-radius: 60px;
  background: linear-gradient(135deg, #f8fafc, #ffffff);
  padding: 20px 30px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  border: 1px solid rgba(144, 209, 5, 0.2);
}

.audio-visualizer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 80px;
  margin-bottom: 20px;
}

.audio-visualizer .bar {
  width: 6px;
  background: linear-gradient(135deg, #90d105, #6a9e05);
  border-radius: 3px;
  transition: height 0.1s ease;
  animation: soundWave 1s ease-in-out infinite;
}

.audio-visualizer .bar:nth-child(1) { height: 30px; animation-delay: 0s; }
.audio-visualizer .bar:nth-child(2) { height: 45px; animation-delay: 0.1s; }
.audio-visualizer .bar:nth-child(3) { height: 25px; animation-delay: 0.2s; }
.audio-visualizer .bar:nth-child(4) { height: 55px; animation-delay: 0.3s; }
.audio-visualizer .bar:nth-child(5) { height: 35px; animation-delay: 0.4s; }
.audio-visualizer .bar:nth-child(6) { height: 50px; animation-delay: 0.5s; }
.audio-visualizer .bar:nth-child(7) { height: 28px; animation-delay: 0.6s; }
.audio-visualizer .bar:nth-child(8) { height: 42px; animation-delay: 0.7s; }
.audio-visualizer .bar:nth-child(9) { height: 32px; animation-delay: 0.8s; }
.audio-visualizer .bar:nth-child(10) { height: 48px; animation-delay: 0.9s; }
.audio-visualizer .bar:nth-child(11) { height: 22px; animation-delay: 1s; }
.audio-visualizer .bar:nth-child(12) { height: 38px; animation-delay: 1.1s; }

@keyframes soundWave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1); }
}

.audio-controls-modern {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.audio-controls-modern button {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  border: none;
  padding: 10px 20px;
  border-radius: 40px;
  color: white;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.audio-controls-modern button:hover {
  background: #90d105;
  color: #0f2e00;
  transform: translateY(-2px);
}

.audio-time {
  color: #64748b;
  font-size: 0.8rem;
  font-family: monospace;
  font-weight: 600;
}

/* Player de áudio nativo escondido */
.native-audio {
  display: none;
}

/* Imagem */
.gt-image {
  margin-top: 20px;
  border-radius: 24px;
  overflow: hidden;
  background: #f8fafc;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

.gt-image img {
  max-width: 100%;
  max-height: 420px;
  object-fit: contain;
  display: block;
  margin: 0 auto;
}

/* Estado vazio */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}

.empty-state .emoji {
  font-size: 4rem;
  margin-bottom: 20px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.8; }
}

.empty-state h3 {
  font-size: 1.5rem;
  color: #0f172a;
  margin-bottom: 10px;
}

.empty-state p {
  color: #64748b;
}
</style>
</head>
<body>
<div class="gt-container" id="gt-container">
  <div id="dynamic-content">
    <div class="empty-state">
      <div class="emoji">📭</div>
      <h3>Aguardando Conteúdo</h3>
      <p>Envie uma mensagem, foto, vídeo ou áudio pelo WhatsApp<br>para aparecer aqui no vMix</p>
    </div>
  </div>
</div>

<script>
let currentVideo = null;
let currentAudio = null;
let progressInterval = null;

async function carregarMensagem() {
  try {
    const res = await fetch("/datasource");
    const data = await res.json();
    const mensagem = data[0];
    
    if (mensagem && mensagem.nome && mensagem.mensagem !== "Nenhuma mensagem no ar") {
      renderizarGT(mensagem);
    } else {
      renderizarVazio();
    }
  } catch (error) {
    console.error("Erro ao carregar:", error);
    renderizarVazio();
  }
}

function formatTime(seconds) {
  if (isNaN(seconds)) return "0:00";
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function updateVideoProgress() {
  if (currentVideo && !currentVideo.paused) {
    const progressBar = document.getElementById("progress-fill");
    const currentTimeSpan = document.getElementById("current-time");
    const durationSpan = document.getElementById("duration-time");
    
    if (progressBar) {
      const percent = (currentVideo.currentTime / currentVideo.duration) * 100;
      progressBar.style.width = `${percent}%`;
    }
    if (currentTimeSpan) {
      currentTimeSpan.textContent = formatTime(currentVideo.currentTime);
    }
    if (durationSpan && currentVideo.duration) {
      durationSpan.textContent = formatTime(currentVideo.duration);
    }
  }
}

function setupVideoProgressListener() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(updateVideoProgress, 500);
}

function seekVideo(event) {
  if (!currentVideo) return;
  const container = event.currentTarget;
  const rect = container.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const percent = x / rect.width;
  currentVideo.currentTime = percent * currentVideo.duration;
}

function renderizarGT(msg) {
  const container = document.getElementById("dynamic-content");
  
  const temVideo = msg.videoUrl && msg.videoUrl !== "";
  const temAudio = msg.audioUrl && msg.audioUrl !== "";
  const temImagem = msg.imagemUrl && msg.imagemUrl !== "";
  const temMidia = temVideo || temAudio || temImagem;
  const somenteTexto = !temMidia;
  
  let mediaHtml = "";
  
  // Determinar classe da mensagem
  let messageClass = "";
  if (somenteTexto) {
    messageClass = "only-text";
  } else if (temMidia) {
    messageClass = "with-media";
  }
  
  // Vídeo moderno
  if (temVideo) {
    mediaHtml = `
      <div class="video-wrapper">
        <video id="gt-video" playsinline>
          <source src="${escapeHtml(msg.videoUrl)}" type="video/mp4">
          Seu navegador não suporta vídeo.
        </video>
        <div class="video-progress">
          <span id="current-time">0:00</span>
          <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <span id="duration-time">0:00</span>
        </div>
        <div class="video-controls-modern">
          <button onclick="playVideo()"><i class="fas fa-play"></i> Play</button>
          <button onclick="pauseVideo()"><i class="fas fa-pause"></i> Pause</button>
          <button onclick="replayVideo()"><i class="fas fa-redo-alt"></i> Replay</button>
          <button onclick="toggleFullscreen()"><i class="fas fa-expand"></i> Tela Cheia</button>
          <button onclick="mutarVideo()"><i class="fas fa-volume-up"></i> Mudo</button>
        </div>
      </div>
    `;
  } 
  // Áudio moderno
  else if (temAudio) {
    mediaHtml = `
      <div class="audio-wrapper">
        <div class="audio-visualizer">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <audio id="gt-audio" class="native-audio" controls>
          <source src="${escapeHtml(msg.audioUrl)}" type="audio/mpeg">
        </audio>
        <div class="audio-controls-modern">
          <button onclick="playAudio()"><i class="fas fa-play"></i> Play</button>
          <button onclick="pauseAudio()"><i class="fas fa-pause"></i> Pause</button>
          <button onclick="replayAudio()"><i class="fas fa-redo-alt"></i> Replay</button>
          <span class="audio-time" id="audio-time-status">0:00 / 0:00</span>
        </div>
      </div>
    `;
  } 
  // Imagem
  else if (temImagem) {
    mediaHtml = `
      <div class="gt-image">
        <img src="${escapeHtml(msg.imagemUrl)}" alt="Imagem enviada" onerror="this.style.display='none'">
      </div>
    `;
  }
  
  // Foto de perfil
  const fotoPerfil = msg.foto && msg.foto !== "/fotos/default.png" ? msg.foto : null;
  
  const html = `
    <div class="gt-header">
      ${fotoPerfil ? `<img class="gt-avatar" src="${escapeHtml(fotoPerfil)}" onerror="this.src='/fotos/default.png'" alt="${escapeHtml(msg.nome)}">` : `
        <div class="gt-avatar" style="background: linear-gradient(135deg, #90d105, #6a9e05); display: flex; align-items: center; justify-content: center;">
          <span style="font-size: 2.5rem;">📱</span>
        </div>
      `}
      <div class="gt-info">
        <div class="gt-name">${escapeHtml(msg.nome)}</div>
      </div>
    </div>
    
    ${msg.mensagem && msg.mensagem !== "" ? `
      <div class="gt-message ${messageClass}">
        <div class="gt-message-label">💬 MENSAGEM</div>
        <div class="gt-message-text">${escapeHtml(msg.mensagem)}</div>
      </div>
    ` : ''}
    
    ${mediaHtml}
  `;
  
  container.innerHTML = html;
  
  // Configurar vídeo
  if (temVideo) {
    const video = document.getElementById("gt-video");
    if (video) {
      currentVideo = video;
      video.addEventListener('loadedmetadata', () => {
        const durationSpan = document.getElementById("duration-time");
        if (durationSpan) durationSpan.textContent = formatTime(video.duration);
      });
      video.addEventListener('timeupdate', updateVideoProgress);
      video.addEventListener('ended', () => {
        console.log("Vídeo finalizado");
      });
      
      const progressContainer = document.getElementById("progress-container");
      if (progressContainer) {
        progressContainer.addEventListener('click', seekVideo);
      }
      
      setupVideoProgressListener();
      video.play().catch(e => console.log("Autoplay bloqueado:", e));
    }
  }
  
  // Configurar áudio
  if (temAudio) {
    const audio = document.getElementById("gt-audio");
    if (audio) {
      currentAudio = audio;
      audio.addEventListener('loadedmetadata', () => {
        const timeSpan = document.getElementById("audio-time-status");
        if (timeSpan) timeSpan.textContent = `0:00 / ${formatTime(audio.duration)}`;
      });
      audio.addEventListener('timeupdate', () => {
        const timeSpan = document.getElementById("audio-time-status");
        if (timeSpan) timeSpan.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
      });
      audio.addEventListener('ended', () => {
        console.log("Áudio finalizado");
      });
      audio.play().catch(e => console.log("Autoplay bloqueado:", e));
    }
  }
}

function renderizarVazio() {
  const container = document.getElementById("dynamic-content");
  container.innerHTML = `
    <div class="empty-state">
      <div class="emoji">📭</div>
      <h3>Aguardando Conteúdo</h3>
      <p>Envie uma mensagem, foto, vídeo ou áudio pelo WhatsApp<br>para aparecer aqui no vMix</p>
    </div>
  `;
  if (progressInterval) clearInterval(progressInterval);
}

// Controles de vídeo
function playVideo() { if (currentVideo) currentVideo.play(); }
function pauseVideo() { if (currentVideo) currentVideo.pause(); }
function replayVideo() { if (currentVideo) { currentVideo.currentTime = 0; currentVideo.play(); } }
function toggleFullscreen() {
  if (!currentVideo) return;
  if (!document.fullscreenElement) {
    currentVideo.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }
}
function mutarVideo() { if (currentVideo) currentVideo.muted = !currentVideo.muted; }

// Controles de áudio
function playAudio() { if (currentAudio) currentAudio.play(); }
function pauseAudio() { if (currentAudio) currentAudio.pause(); }
function replayAudio() { if (currentAudio) { currentAudio.currentTime = 0; currentAudio.play(); } }

function escapeHtml(str) {
  if (!str) return "";
  return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
}

let ultimaMensagemId = null;

async function carregarComCache() {
  try {
    const res = await fetch("/datasource");
    const data = await res.json();
    const mensagem = data[0];
    
    if (mensagem && mensagem.id !== ultimaMensagemId) {
      ultimaMensagemId = mensagem.id;
      if (mensagem.nome && mensagem.mensagem !== "Nenhuma mensagem no ar") {
        renderizarGT(mensagem);
      } else {
        renderizarVazio();
      }
    }
  } catch (error) {
    console.error("Erro ao carregar:", error);
  }
}

carregarComCache();
setInterval(carregarComCache, 2000);
</script>
</body>
</html>
